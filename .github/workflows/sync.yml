name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # This allows you to run it manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://AlexDev123:$HF_TOKEN@huggingface.co/spaces/AlexDev123/Environment-Sound-API main
