version: '3.8'

services:
  yamnet-api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - HOST=0.0.0.0
      - DEBUG=false
      - LOG_LEVEL=INFO
      - RATE_LIMIT_PER_MINUTE=60
      - MODEL_CACHE_DIR=/app/models
      # Set specific origins for production (comma-separated)
      # - ALLOWED_ORIGINS=https://your-app.com,https://your-app.netlify.app
      - ALLOWED_ORIGINS=*
    volumes:
      # Persist model cache between restarts
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
